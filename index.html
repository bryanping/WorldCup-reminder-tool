:root{--bg:#0b1220;--card:#131c30;--card2:#1a2742;--tx:#e8eefc;--mut:#8fa3c8;--ac:#4f8cff;--ac2:#22c55e;--gold:#fbbf24;--bd:#243352;--red:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Noto Sans JP",sans-serif;min-height:100vh}
.wrap{max-width:880px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0 4px;flex-wrap:wrap}
h1{font-size:1.35rem;display:flex;align-items:center;gap:8px}
.sub{color:var(--mut);font-size:.82rem;margin:4px 0 10px}
select,input[type=text]{background:var(--card2);color:var(--tx);border:1px solid var(--bd);border-radius:10px;padding:8px 10px;font-size:.9rem;outline:none}
select:focus,input:focus{border-color:var(--ac)}
#langSel{font-weight:600}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.bar input[type=text]{flex:1;min-width:160px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 12px}
.chip{background:var(--card2);border:1px solid var(--bd);color:var(--mut);border-radius:999px;padding:5px 12px;font-size:.8rem;cursor:pointer;user-select:none}
.chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
.chip.star{color:var(--gold)}
.chip.star.on{background:var(--gold);border-color:var(--gold);color:#1a1200}
.flags{display:flex;gap:4px;overflow-x:auto;padding:6px 2px;margin:2px 0 4px;scrollbar-width:thin}
.fbtn{flex:0 0 auto;font-size:1.35rem;line-height:1;background:var(--card2);border:2px solid var(--bd);border-radius:10px;padding:6px 8px;cursor:pointer;user-select:none;opacity:.85}
.fbtn:hover{border-color:var(--ac);opacity:1}
.fbtn.on{border-color:var(--gold);background:#2a2410;opacity:1}
.next{background:linear-gradient(120deg,#16244a,#0e3a2e);border:1px solid var(--bd);border-radius:14px;padding:12px 16px;margin:4px 0 14px;display:none}
.next.show{display:block}
.next .nt{color:var(--mut);font-size:.75rem;margin-bottom:4px}
.next .nm{font-weight:700;font-size:1.02rem}
.next .cd{font-variant-numeric:tabular-nums;color:var(--ac2);font-weight:700;font-size:1.1rem;margin-top:4px}
.dhead{color:var(--mut);font-size:.85rem;font-weight:700;margin:18px 0 8px;border-bottom:1px solid var(--bd);padding-bottom:6px;position:sticky;top:0;background:var(--bg);z-index:2}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.card.starred{border-color:var(--gold)}
.row1{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.badge{font-size:.68rem;color:var(--mut);background:var(--card2);border-radius:6px;padding:2px 8px;letter-spacing:.4px}
.badge.live{background:var(--red);color:#fff;animation:pl 1.2s infinite}
@keyframes pl{50%{opacity:.55}}
.time{font-weight:700;color:var(--ac);font-size:.92rem;font-variant-numeric:tabular-nums}
.teams{display:flex;align-items:center;gap:10px;margin:10px 0 6px;font-size:1.02rem;font-weight:600;flex-wrap:wrap}
.fl{font-size:1.3rem}
.vs{color:var(--mut);font-weight:400;font-size:.8rem}
.loc{color:var(--mut);font-size:.78rem;margin-bottom:10px}
.cdwn{display:inline-block;color:var(--ac2);font-weight:700;font-size:.82rem;font-variant-numeric:tabular-nums;background:#0e2a1e;border-radius:7px;padding:2px 8px;margin-left:8px}
.sc{color:var(--gold);font-size:1.15rem;font-variant-numeric:tabular-nums;padding:0 4px}
.doneSec{margin-bottom:14px}
.doneSec summary{cursor:pointer;color:var(--mut);font-size:.88rem;font-weight:700;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;user-select:none;list-style:none}
.doneSec summary::-webkit-details-marker{display:none}
.doneSec summary:hover{border-color:var(--ac)}
.doneSec[open] summary{margin-bottom:8px}
.doneSec .card{opacity:.7}
.acts{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--bd);background:var(--card2);color:var(--tx);border-radius:9px;padding:6px 12px;font-size:.8rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn:hover{border-color:var(--ac)}
.btn.star{font-weight:700}
.btn.star.on{background:var(--gold);color:#1a1200;border-color:var(--gold)}
.empty{color:var(--mut);text-align:center;padding:40px 0}
footer{color:var(--mut);font-size:.75rem;text-align:center;padding:24px 0 16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ac2);color:#06250f;font-weight:700;padding:10px 18px;border-radius:12px;font-size:.85rem;opacity:0;transition:.3s;pointer-events:none;z-index:9}
.toast.show{opacity:1}
.kfModal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:50;padding:14px}
.kfModal.show{display:flex}
.kfBox{background:#f9f9f9;border-radius:16px;max-width:420px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 18px 60px rgba(0,0,0,.5)}
.kfTop{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;color:#222;font-weight:700;font-size:.9rem}
.kfSkip{border:1px solid #ccc;background:#fff;color:#555;border-radius:8px;padding:5px 14px;font-size:.8rem;cursor:pointer;flex:0 0 auto}
.kfSkip:hover{background:#eee}
@media(max-width:520px){.acts .btn{padding:6px 9px;font-size:.74rem}}

 if(!pool.length){box.classList.remove("show");return}
 const m=pool.sort((a,b)=>new Date(a[1])-new Date(b[1]))[0];
 box.classList.add("show");
 $("nextMatch").textContent=`${fl(m[4])} ${tn(m[4])} vs ${fl(m[5])} ${tn(m[5])} · ${fmtTime(new Date(m[1]))}`;
 const tick=()=>{
  let dl=new Date(m[1]).getTime()-Date.now();
  if(dl<0){updateNext();render();return}
  const dd=Math.floor(dl/864e5);dl%=864e5;
  const hh=Math.floor(dl/36e5);dl%=36e5;
  const mm=Math.floor(dl/6e4),ss=Math.floor(dl%6e4/1e3);
  $("nextCd").textContent=(dd?dd+"d ":"")+pad(hh)+":"+pad(mm)+":"+pad(ss)};
 tick();cdT=setInterval(tick,1000)}
// ===== notifications (while page open)
let nT=[];
function scheduleNotifs(){
 nT.forEach(clearTimeout);nT=[];
 if(!("Notification"in window)||Notification.permission!=="granted")return;
 const now=Date.now();
 M.filter(m=>stars.has(m[0])).forEach(m=>{
  const fire=new Date(m[1]).getTime()-lead*6e4-now;
  if(fire>0&&fire<864e5*7)nT.push(setTimeout(()=>{
   new Notification(t().noti,{body:`${tn(m[4])} vs ${tn(m[5])} · ${fmtTime(new Date(m[1]))} · ${evLoc(m)}`})},fire))})}

// ===== 即時比分（ESPN 公開 API，免金鑰；失敗時靜默退回時間判斷）
const ALIAS={MEX:["mexico"],RSA:["south africa"],KOR:["south korea","korea republic"],CZE:["czech"],CAN:["canada"],SUI:["switzerland"],QAT:["qatar"],BIH:["bosnia"],BRA:["brazil"],MAR:["morocco"],HAI:["haiti"],SCO:["scotland"],USA:["usa","united states"],PAR:["paraguay"],AUS:["australia"],TUR:["turkiye","turkey"],GER:["germany"],CUW:["curacao"],CIV:["cote d'ivoire","ivory coast"],ECU:["ecuador"],NED:["netherlands"],JPN:["japan"],TUN:["tunisia"],SWE:["sweden"],BEL:["belgium"],EGY:["egypt"],IRN:["iran"],NZL:["new zealand"],ESP:["spain"],CPV:["cabo verde","cape verde"],KSA:["saudi"],URU:["uruguay"],FRA:["france"],SEN:["senegal"],NOR:["norway"],IRQ:["iraq"],ARG:["argentina"],ALG:["algeria"],AUT:["austria"],JOR:["jordan"],POR:["portugal"],UZB:["uzbekistan"],COL:["colombia"],COD:["congo"],ENG:["england"],CRO:["croatia"],GHA:["ghana"],PAN:["panama"]};
function nrm(x){return (x||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function tMatch(name,code){const n=nrm(name);return (ALIAS[code]||[]).some(a=>n.includes(a))}
async function fetchScores(){
 try{
  const r=await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=300");
  if(!r.ok)return;
  const j=await r.json();
  (j.events||[]).forEach(ev=>{
   const c=ev.competitions&&ev.competitions[0];if(!c)return;
   const H=(c.competitors||[]).find(x=>x.homeAway==="home"),A=(c.competitors||[]).find(x=>x.homeAway==="away");
   if(!H||!A)return;
   const ets=new Date(ev.date).getTime();
   const cand=M.filter(m=>Math.abs(new Date(m[1]).getTime()-ets)<9e6);
   let m=cand.find(m=>TM[m[4]]&&TM[m[5]]&&((tMatch(H.team.displayName,m[4])&&tMatch(A.team.displayName,m[5]))||(tMatch(H.team.displayName,m[5])&&tMatch(A.team.displayName,m[4]))));
   if(!m){const ko=cand.filter(x=>!TM[x[4]]||!TM[x[5]]);if(ko.length===1)m=ko[0]}
   if(!m)return;
   SCORES[m[0]]={hs:H.score,as:A.score,st:ev.status&&ev.status.type?ev.status.type.state:"pre",
    clock:ev.status?ev.status.displayClock:"",hn:H.team.shortDisplayName,an:A.team.shortDisplayName,
    swap:!!(TM[m[4]]&&tMatch(H.team.displayName,m[5]))}});
  render();
 }catch(e){}}
fetchScores();setInterval(fetchScores,6e4);
// ===== 每張卡的開賽倒數（依用戶時區自動計算）
function fmtCd(dl){
 const dd=Math.floor(dl/864e5);dl%=864e5;
 const hh=Math.floor(dl/36e5);dl%=36e5;
 return (dd?dd+"d ":"")+pad(hh)+":"+pad(Math.floor(dl/6e4))+":"+pad(Math.floor(dl%6e4/1e3))}
setInterval(()=>{
 const now=Date.now();let expired=false;
 document.querySelectorAll(".cdwn").forEach(e=>{
  const dl=+e.dataset.ts-now;
  if(dl<=0){expired=true;return}
  e.textContent="⏳ "+fmtCd(dl)});
 if(expired)render()},1000);
applyStatic();render();scheduleNotifs();
setInterval(render,6e4);
</script>
